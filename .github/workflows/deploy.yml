name: Deploy to Boomi

on:
  push:
    branches:
      - main
    paths:
      - 'configs/components.json'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Verify Boomi Connection
        run: |
          echo "Checking Boomi API connection..."
          STATUS=$(curl -s -o /tmp/conn_test.txt -w "%{http_code}" \
            -X GET \
            "https://api.boomi.com/api/rest/v1/${{ secrets.BOOMI_ACCOUNT_ID }}/Environment" \
            -u "${{ secrets.BOOMI_USERNAME }}:${{ secrets.BOOMI_PASSWORD }}" \
            -H "Accept: application/json")
          echo "Status: $STATUS"
          cat /tmp/conn_test.txt
          if [ "$STATUS" != "200" ]; then
            echo "Connection failed. Check your secrets."
            exit 1
          fi
          echo "Connection successful!"

      - name: Parse Components File
        run: |
          python3 <<EOF
import json

with open('configs/components.json') as f:
    data = json.load(f)

lines = []
for c in data['components']:
    entry = '~~~'.join([
        c['componentId'],
        c['packageVersion'],
        c.get('notes', 'Deployed via GitHub Actions'),
        c['name']
    ])
    lines.append(entry)

with open('/tmp/components.txt', 'w') as f:
    f.write('\n'.join(lines))

print(f"Found {len(lines)} component(s) to deploy")
EOF

      - name: Deploy to Boomi
        run: |
          ACCOUNT_ID="${{ secrets.BOOMI_ACCOUNT_ID }}"
          USERNAME="${{ secrets.BOOMI_USERNAME }}"
          PASSWORD="${{ secrets.BOOMI_PASSWORD }}"
          ENV_ID="${{ secrets.BOOMI_ENV_ID }}"
          RUN_NUMBER="${{ github.run_number }}"

          FAILED=0

          while IFS='~~~' read -r COMP_ID VERSION NOTES NAME; do
            echo "========================================"
            echo "Component : $NAME"
            echo "ID        : $COMP_ID"
            echo "Version   : ${VERSION}.${RUN_NUMBER}"

            echo "Creating package..."
            PKG_BODY=$(curl -s \
              -X POST \
              "https://api.boomi.com/api/rest/v1/${ACCOUNT_ID}/PackagedComponent" \
              -u "${USERNAME}:${PASSWORD}" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -d "{\"componentId\":\"${COMP_ID}\",\"packageVersion\":\"${VERSION}.${RUN_NUMBER}\",\"notes\":\"${NOTES}\"}")

            echo "Package response: $PKG_BODY"

            if [ -z "$PKG_BODY" ]; then
              echo "ERROR: Empty response. Skipping $NAME."
              FAILED=1
              continue
            fi

            PKG_ID=$(echo "$PKG_BODY" | python3 -c "
import sys, json
d=json.load(sys.stdin)
if '@type' in d and d['@type']=='Error':
    print('ERROR:'+d.get('message','Unknown error'))
else:
    print(d.get('packageId',''))
")

            if [[ "$PKG_ID" == ERROR:* ]]; then
              echo "ERROR from Boomi: ${PKG_ID#ERROR:}"
              FAILED=1
              continue
            fi

            if [ -z "$PKG_ID" ]; then
              echo "ERROR: No packageId returned. Skipping $NAME."
              FAILED=1
              continue
            fi

            echo "Package created: $PKG_ID"

            echo "Deploying..."
            DEPLOY_BODY=$(curl -s \
              -X POST \
              "https://api.boomi.com/api/rest/v1/${ACCOUNT_ID}/DeployedPackage" \
              -u "${USERNAME}:${PASSWORD}" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -d "{\"environmentId\":\"${ENV_ID}\",\"packageId\":\"${PKG_ID}\",\"notes\":\"Run #${RUN_NUMBER}\"}")

            echo "Deploy response: $DEPLOY_BODY"

            DEPLOY_CHECK=$(echo "$DEPLOY_BODY" | python3 -c "
import sys, json
d=json.load(sys.stdin)
if '@type' in d and d['@type']=='Error':
    print('ERROR:'+d.get('message','Unknown error'))
else:
    print('OK')
")

            if [[ "$DEPLOY_CHECK" == ERROR:* ]]; then
              echo "DEPLOY ERROR: ${DEPLOY_CHECK#ERROR:}"
              FAILED=1
              continue
            fi

            echo "SUCCESS: $NAME deployed!"
            sleep 0.5

          done < /tmp/components.txt

          echo "========================================"
          if [ "$FAILED" -eq 1 ]; then
            echo "One or more components failed. Check logs above."
            exit 1
          fi

          echo "All components deployed successfully!"
