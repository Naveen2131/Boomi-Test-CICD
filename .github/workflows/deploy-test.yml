name: Deploy to Boomi TEST

on:
  push:
    branches:
      - test
    paths:
      - 'configs/components.json'

jobs:
  deploy-to-test:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Test Boomi API Credentials
        run: |
          echo "Testing Boomi API connection..."
          RESPONSE=$(curl -s -o /tmp/boomi_test.txt -w "%{http_code}" \
            -X GET \
            "https://api.boomi.com/api/rest/v1/${{ secrets.BOOMI_ACCOUNT_ID }}/Environment" \
            -u "${{ secrets.BOOMI_USERNAME }}:${{ secrets.BOOMI_PASSWORD }}" \
            -H "Accept: application/json")
          echo "HTTP Status: $RESPONSE"
          echo "Response Body:"
          cat /tmp/boomi_test.txt
          if [ "$RESPONSE" != "200" ]; then
            echo "FAILED: Cannot connect to Boomi API."
            exit 1
          fi
          echo "SUCCESS: Boomi API connection works!"

      - name: Parse Components
        id: parse
        run: |
          python3 - <<'PYEOF'
          import json
          with open('configs/components.json') as f:
              data = json.load(f)
          lines = []
          for c in data['components']:
              lines.append(c['componentId'] + '~~~' + c['packageVersion'] + '~~~' + c.get('notes', 'Deployed') + '~~~' + c['name'])
          with open('/tmp/components.txt', 'w') as f:
              f.write('\n'.join(lines))
          print("Parsed " + str(len(lines)) + " component(s)")
          PYEOF

      - name: Deploy All Components to TEST
        run: |
          ACCOUNT_ID="${{ secrets.BOOMI_ACCOUNT_ID }}"
          USERNAME="${{ secrets.BOOMI_USERNAME }}"
          PASSWORD="${{ secrets.BOOMI_PASSWORD }}"
          ENV_ID="${{ secrets.BOOMI_TEST_ENV_ID }}"
          RUN_NUMBER="${{ github.run_number }}"

          while IFS='~~~' read -r COMP_ID VERSION NOTES NAME; do
            echo "============================================"
            echo "Deploying: $NAME"
            echo "Component ID: $COMP_ID"
            echo "Version: $VERSION"

            echo "--- Creating package..."
            PKG_BODY=$(curl -s \
              -X POST \
              "https://api.boomi.com/api/rest/v1/${ACCOUNT_ID}/PackagedComponent" \
              -u "${USERNAME}:${PASSWORD}" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -d "{\"componentId\":\"${COMP_ID}\",\"packageVersion\":\"${VERSION}.${RUN_NUMBER}\",\"notes\":\"${NOTES}\"}")

            echo "Package Response: $PKG_BODY"

            if [ -z "$PKG_BODY" ]; then
              echo "ERROR: Empty response from Boomi API"
              exit 1
            fi

            PKG_ID=$(echo "$PKG_BODY" | python3 -c "import sys,json; print(json.load(sys.stdin).get('packageId',''))")

            if [ -z "$PKG_ID" ]; then
              echo "ERROR: Could not get packageId. Full response: $PKG_BODY"
              exit 1
            fi

            echo "Package ID: $PKG_ID"

            echo "--- Deploying to TEST..."
            DEPLOY_BODY=$(curl -s \
              -X POST \
              "https://api.boomi.com/api/rest/v1/${ACCOUNT_ID}/DeployedPackage" \
              -u "${USERNAME}:${PASSWORD}" \
              -H "Content-Type: application/json" \
              -H "Accept: application/json" \
              -d "{\"environmentId\":\"${ENV_ID}\",\"packageId\":\"${PKG_ID}\",\"notes\":\"GitHub Actions Run ${RUN_NUMBER}\"}")

            echo "Deploy Response: $DEPLOY_BODY"
            echo "SUCCESS: $NAME deployed to TEST!"
            sleep 0.5

          done < /tmp/components.txt

          echo "============================================"
          echo "All components deployed to TEST successfully!"
